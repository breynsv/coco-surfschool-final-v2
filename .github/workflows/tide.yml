name: Update tide data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours = 4 calls/day (well under Stormglass free 10/day)
  workflow_dispatch: {}       # allow manual runs

permissions:
  contents: write

concurrency:
  group: tide
  cancel-in-progress: false

jobs:
  tide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch tide extremes from Stormglass
        env:
          STORMGLASS_KEY: ${{ secrets.STORMGLASS_KEY }}
        run: node scripts/fetch-tide.mjs
      - name: Commit updated tide data
        run: |
          git config user.name "tide-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/tide.json
          git diff --staged --quiet || git commit -m "chore: update tide data [skip ci]"
          git push
